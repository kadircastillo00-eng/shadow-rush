name: Build Shadow Rush Android APK

on:
  push:
    branches: [main]
    paths:
      - "artifacts/shadow-rush/**"
      - "lib/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle for Android
        run: pnpm --filter @workspace/shadow-rush run build:android

      - name: Sync Capacitor Android project
        working-directory: artifacts/shadow-rush
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: artifacts/shadow-rush/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/shadow-rush/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadow-rush-debug-apk
          path: artifacts/shadow-rush/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
