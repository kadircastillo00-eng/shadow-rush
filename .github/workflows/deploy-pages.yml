# ═══════════════════════════════════════════════════════════
#  Shadow Rush — Deploy to GitHub Pages
#
#  Se ejecuta:
#   • Automáticamente en cada push a main que toque el juego
#   • Manualmente desde GitHub → Actions → "Run workflow"
#
#  Publica el juego (build estático) en GitHub Pages, en:
#   https://<usuario>.github.io/<repositorio>/
#
#  Requiere habilitar Pages una sola vez en:
#   GitHub → Settings → Pages → Source → "GitHub Actions"
# ═══════════════════════════════════════════════════════════
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "artifacts/shadow-rush/**"
      - "lib/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Shadow Rush for GitHub Pages
        working-directory: artifacts/shadow-rush
        env:
          # PORT is required by vite.config.ts but unused during a static build.
          PORT: "5173"
          # Must match "/<repository-name>/" so asset URLs resolve under the
          # GitHub Pages project-site sub-path (https://<user>.github.io/<repo>/).
          BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/shadow-rush/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
