# ═══════════════════════════════════════════════════════════
#  Shadow Rush — Build Android Debug APK
#
#  Se ejecuta:
#   • Automáticamente en cada push a main
#   • Manualmente desde GitHub → Actions → "Run workflow"
#
#  El APK descargable aparece en:
#   GitHub → Actions → <run> → Artifacts → shadow-rush-debug.apk
#   (disponible 14 días)
# ═══════════════════════════════════════════════════════════
name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      # Solo re-construye si cambia código relevante
      - 'artifacts/shadow-rush/src/**'
      - 'artifacts/shadow-rush/index.html'
      - 'artifacts/shadow-rush/android/**'
      - 'artifacts/shadow-rush/capacitor.config.ts'
      - 'artifacts/shadow-rush/vite.android.config.ts'
      - 'artifacts/shadow-rush/package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build-android-apk.yml'
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Mostrar logs detallados de Gradle'
        required: false
        default: 'false'

jobs:
  build-apk:
    name: Compile debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. CÓDIGO ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JAVA ──────────────────────────────────────────
      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ── 3. NODE + PNPM ───────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      # ── 4. DEPENDENCIAS ──────────────────────────────────
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. BUILD WEB (para Android) ──────────────────────
      - name: Build web assets
        working-directory: artifacts/shadow-rush
        run: pnpm run build:android

      # ── 6. CAP SYNC ──────────────────────────────────────
      # Copia los web assets al proyecto Android y actualiza plugins
      # (No sobreescribe AndroidManifest.xml con cambios manuales)
      - name: Sync Capacitor Android
        working-directory: artifacts/shadow-rush
        run: pnpm exec cap sync android

      # ── 7. CACHE GRADLE ──────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('artifacts/shadow-rush/android/**/*.gradle*', 'artifacts/shadow-rush/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 8. COMPILAR APK ──────────────────────────────────
      - name: Make Gradle wrapper executable
        working-directory: artifacts/shadow-rush/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/shadow-rush/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --build-cache \
            ${{ inputs.debug_enabled == 'true' && '--stacktrace --info' || '' }}

      # ── 9. SUBIR ARTEFACTO ───────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadow-rush-debug
          path: artifacts/shadow-rush/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error

      # ── 10. RESUMEN ──────────────────────────────────────
      - name: Print APK info
        run: |
          APK=artifacts/shadow-rush/android/app/build/outputs/apk/debug/app-debug.apk
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "## APK generado ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Archivo | app-debug.apk |" >> $GITHUB_STEP_SUMMARY
          echo "| Tamaño | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| App ID | com.shadowrush.game |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Descarga el APK desde la sección **Artifacts** de esta ejecución." >> $GITHUB_STEP_SUMMARY
