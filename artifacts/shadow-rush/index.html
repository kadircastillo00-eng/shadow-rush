<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#050510" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Shadow Rush</title>
  <meta name="description" content="Shadow Rush — an addictive neon arcade game. Level up, unlock skins, collect coins!" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/game.css" />
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- Countdown Overlay -->
  <div id="countdown-overlay" class="fullscreen-overlay hidden">
    <div id="countdown-number">3</div>
    <div id="countdown-go" class="hidden">GO!</div>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="hud-top">
      <div id="hud-left">
        <div id="score-display">
          <span class="hud-label">SCORE</span>
          <span id="score">0</span>
        </div>
        <div id="combo-display">
          <span id="combo-text">x1</span>
          <span class="hud-label">COMBO</span>
        </div>
      </div>
      <div id="hud-center">
        <div id="rule-timer-wrap">
          <div id="rule-timer-bar"><div id="rule-timer-fill"></div></div>
          <span id="rule-label"></span>
        </div>
        <div id="event-banner" class="hidden"></div>
      </div>
      <div id="hud-right">
        <div id="coin-display">
          <span id="coin-icon">◈</span>
          <span id="hud-coins">0</span>
        </div>
        <button id="pause-btn" aria-label="Pause">⏸</button>
      </div>
    </div>
    <div id="hud-bottom">
      <div id="xp-bar-wrap">
        <span id="hud-level">LV 1</span>
        <div id="xp-bar"><div id="xp-bar-fill"></div></div>
        <span id="hud-xp-text">0 XP</span>
      </div>
    </div>
  </div>

  <!-- Start / Home Screen -->
  <div id="start-screen" class="overlay">
    <div class="overlay-content start-content">
      <div class="game-logo">
        <div class="logo-cube" id="logo-cube-el"></div>
        <h1>SHADOW<br/><span>RUSH</span></h1>
      </div>

      <div id="player-badge">
        <div id="player-level-badge">LV <span id="menu-level">1</span></div>
        <div id="player-xp-bar-wrap">
          <div id="player-xp-bar"><div id="player-xp-fill"></div></div>
        </div>
        <div id="menu-best">BEST: <span id="best-score-val">0</span></div>
      </div>

      <button id="play-btn" class="btn btn-primary btn-pulse">▶ PLAY</button>

      <div class="menu-grid">
        <button id="shop-btn"    class="menu-card">◈<br/><span>SKINS</span></button>
        <button id="missions-btn" class="menu-card">🏆<br/><span>MISSIONS</span></button>
        <button id="wheel-btn"   class="menu-card">🎡<br/><span>WHEEL</span></button>
        <button id="stats-btn"   class="menu-card">📊<br/><span>STATS</span></button>
      </div>

      <button id="daily-reward-btn" class="btn btn-gold hidden">🎁 DAILY LOGIN REWARD</button>
    </div>
  </div>

  <!-- Pause Menu -->
  <div id="pause-menu" class="overlay hidden">
    <div class="overlay-content">
      <h2>PAUSED</h2>
      <div id="pause-score-display"></div>
      <button id="resume-btn"    class="btn btn-primary">▶ RESUME</button>
      <button id="restart-btn"   class="btn btn-secondary">↺ RESTART</button>
      <button id="pause-shop-btn" class="btn btn-secondary">◈ SKINS</button>
      <button id="home-btn"      class="btn btn-ghost">⌂ HOME</button>
    </div>
  </div>

  <!-- Game Over -->
  <div id="game-over" class="overlay hidden">
    <div class="overlay-content gameover-content">
      <h2 class="game-over-title">GAME OVER</h2>

      <div id="final-stats">
        <div class="stat-row">
          <span class="stat-label">SCORE</span>
          <span id="final-score"  class="stat-value neon-cyan">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">BEST</span>
          <span id="final-best"   class="stat-value neon-purple">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">COINS</span>
          <span id="final-coins"  class="stat-value neon-gold">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">XP EARNED</span>
          <span id="final-xp"     class="stat-value neon-green">0</span>
        </div>
        <div id="new-best-badge" class="hidden">🏆 NEW BEST!</div>
      </div>

      <div id="xp-progress-bar-wrap">
        <div class="xp-label-row">
          <span id="go-level-text">LV 1</span>
          <span id="go-xp-text">0 / 0 XP</span>
        </div>
        <div id="go-xp-bar"><div id="go-xp-fill"></div></div>
      </div>

      <div id="mission-progress-list"></div>

      <button id="gameover-restart-btn" class="btn btn-primary btn-pulse">↺ PLAY AGAIN</button>
      <div class="gameover-actions">
        <button id="gameover-shop-btn"  class="btn btn-secondary">◈ SKINS</button>
        <button id="gameover-home-btn"  class="btn btn-ghost">⌂ HOME</button>
      </div>
    </div>
  </div>

  <!-- Skin Shop -->
  <div id="shop-modal" class="overlay hidden">
    <div class="overlay-content shop-content">
      <h2>◈ SKINS</h2>
      <div id="shop-header">
        <div id="shop-coins-display">◈ <span id="shop-coins">0</span></div>
        <div id="shop-level-display">LV <span id="shop-level">1</span></div>
      </div>
      <div id="shop-tabs">
        <button class="shop-tab active" data-tab="all">ALL</button>
        <button class="shop-tab" data-tab="owned">OWNED</button>
        <button class="shop-tab" data-tab="locked">LOCKED</button>
      </div>
      <div id="skin-grid"></div>
      <button id="close-shop-btn" class="btn btn-ghost">✕ CLOSE</button>
    </div>
  </div>

  <!-- Missions & Achievements -->
  <div id="missions-modal" class="overlay hidden">
    <div class="overlay-content missions-content">
      <h2>🏆 MISSIONS</h2>
      <div id="missions-tabs">
        <button class="missions-tab active" data-tab="daily">DAILY</button>
        <button class="missions-tab" data-tab="weekly">WEEKLY</button>
        <button class="missions-tab" data-tab="achievements">BADGES</button>
      </div>
      <div id="daily-missions-panel"  class="missions-panel active-panel"></div>
      <div id="weekly-missions-panel" class="missions-panel"></div>
      <div id="achievements-panel"    class="missions-panel"></div>
      <button id="close-missions-btn" class="btn btn-ghost">✕ CLOSE</button>
    </div>
  </div>

  <!-- Daily Login Reward -->
  <div id="daily-modal" class="overlay hidden">
    <div class="overlay-content">
      <h2>🎁 DAILY LOGIN</h2>
      <div id="streak-display">
        <span id="streak-fire">🔥</span>
        <span id="streak-count">0 DAY STREAK</span>
      </div>
      <div id="daily-calendar"></div>
      <div id="daily-reward-preview">
        <div class="reward-coin-icon">◈</div>
        <div id="daily-reward-amount" class="reward-amount">+50</div>
      </div>
      <button id="claim-reward-btn" class="btn btn-gold">CLAIM REWARD</button>
    </div>
  </div>

  <!-- Lucky Wheel -->
  <div id="wheel-modal" class="overlay hidden">
    <div class="overlay-content">
      <h2>🎡 LUCKY WHEEL</h2>
      <div id="wheel-cooldown-display" class="hidden"></div>
      <div id="wheel-wrap">
        <canvas id="wheel-canvas" width="300" height="300"></canvas>
        <div id="wheel-pointer">▼</div>
      </div>
      <div id="wheel-result" class="hidden"></div>
      <button id="spin-btn" class="btn btn-gold btn-pulse">SPIN!</button>
      <button id="close-wheel-btn" class="btn btn-ghost">✕ CLOSE</button>
    </div>
  </div>

  <!-- Statistics -->
  <div id="stats-modal" class="overlay hidden">
    <div class="overlay-content">
      <h2>📊 STATISTICS</h2>
      <div id="stats-grid"></div>
      <button id="close-stats-btn" class="btn btn-ghost">✕ CLOSE</button>
    </div>
  </div>

  <!-- Level Up Modal -->
  <div id="levelup-modal" class="fullscreen-overlay hidden">
    <div id="levelup-content">
      <div id="levelup-glow"></div>
      <div id="levelup-label">LEVEL UP!</div>
      <div id="levelup-number">2</div>
      <div id="levelup-reward"></div>
      <button id="levelup-ok" class="btn btn-primary">AWESOME!</button>
    </div>
  </div>

  <!-- Rule Change Notification -->
  <div id="rule-notification" class="rule-notification hidden">
    <div id="rule-notification-text"></div>
  </div>

  <!-- Special Event Banner -->
  <div id="special-event-toast" class="special-event-toast hidden">
    <div id="special-event-text"></div>
  </div>

  <!-- Toast Notification (achievement / mission) -->
  <div id="achievement-toast" class="achievement-toast hidden">
    <span class="achievement-icon">🏆</span>
    <div class="achievement-text">
      <div class="achievement-name"></div>
      <div class="achievement-desc"></div>
    </div>
  </div>

  <!-- Coin Pop Label (canvas-drawn coin collect) -->

  <script type="module" src="/src/game.js"></script>
</body>
</html>
